<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neuralearn — Learn to communicate with AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* ------- Design tokens (from styles.css, dark-mode-first) ------- */
  :root {
    --radius: 0.625rem;
    --background: oklch(0.06 0.01 260);
    --foreground: oklch(0.98 0.005 260);
    --card: oklch(0.09 0.015 260);
    --card-foreground: oklch(0.98 0.005 260);
    --primary: oklch(0.65 0.21 255);
    --primary-foreground: oklch(0.08 0.02 260);
    --primary-glow: oklch(0.75 0.18 255);
    --secondary: oklch(0.16 0.02 260);
    --muted: oklch(0.14 0.015 260);
    --muted-foreground: oklch(0.65 0.02 260);
    --border: oklch(1 0 0 / 8%);
    --input: oklch(1 0 0 / 12%);
    --ring: oklch(0.65 0.21 255);
    --gradient-hero: radial-gradient(ellipse at center, oklch(0.65 0.21 255 / 0.18), transparent 60%);
    --shadow-glow: 0 0 60px -10px oklch(0.65 0.21 255 / 0.5);
  }

  * { box-sizing: border-box; border-color: var(--border); }
  html, body { margin: 0; padding: 0; }
  body {
    background-color: var(--background);
    color: var(--foreground);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  /* Glow border button */
  .glow-border {
    position: relative;
    overflow: hidden;
    isolation: isolate;
  }
  .glow-border::before {
    content: "";
    position: absolute;
    width: 260%;
    aspect-ratio: 1;
    left: 50%;
    top: 50%;
    background: conic-gradient(
      from 0deg,
      transparent 0deg,
      transparent 255deg,
      var(--primary) 292deg,
      oklch(0.98 0.02 255) 315deg,
      var(--primary-glow) 338deg,
      transparent 360deg
    );
    animation: glow-spin 2s linear infinite;
    pointer-events: none;
    z-index: -2;
  }
  .glow-border::after {
    content: "";
    position: absolute;
    inset: 1px;
    border-radius: calc(var(--radius) - 3px);
    background: var(--primary);
    pointer-events: none;
    z-index: -1;
  }
  .glow-border > * { position: relative; z-index: 1; }
  @keyframes glow-spin {
    from { transform: translate(-50%, -50%) rotate(0deg); }
    to { transform: translate(-50%, -50%) rotate(360deg); }
  }
  @keyframes rise-up {
    0% { transform: translateY(100%); opacity: 0; }
    100% { transform: translateY(0); opacity: 1; }
  }
  @keyframes slide-in-from-right {
    0% { transform: translateX(40%); opacity: 0; }
    100% { transform: translateX(0); opacity: 1; }
  }
  @keyframes fade-in {
    0% { opacity: 0; transform: translateY(8px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .animate-rise-up { animation: rise-up 0.9s cubic-bezier(0.22,1,0.36,1) both; display: inline-block; }
  .animate-slide-in-from-right { animation: slide-in-from-right 0.9s cubic-bezier(0.22,1,0.36,1) both; display: inline-block; }
  .fade-in { animation: fade-in 0.4s ease both; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: oklch(1 0 0 / 0.08); border-radius: 8px; }
  ::-webkit-scrollbar-thumb:hover { background: oklch(1 0 0 / 0.16); }

  /* Image placeholder pattern */
  .img-placeholder {
    background-color: var(--secondary);
    background-image:
      repeating-linear-gradient(
        135deg,
        oklch(1 0 0 / 0.03) 0,
        oklch(1 0 0 / 0.03) 1px,
        transparent 1px,
        transparent 12px
      );
    position: relative;
    overflow: hidden;
  }

  /* Reset for app-root */
  #app-root { min-height: 100vh; display: flex; flex-direction: column; }
</style>
</head>
<body>
  <div id="app-root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.js"></script>

  <script type="text/babel" src="src/icons.jsx"></script>
  <script type="text/babel" src="src/shared.jsx"></script>
  <script type="text/babel" src="src/landing.jsx"></script>
  <script type="text/babel" src="src/practice.jsx"></script>
  <script type="text/babel" src="src/chat.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
